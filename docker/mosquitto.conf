# Mosquitto MQTT Broker 配置

# 全局设置
per_listener_settings true

# 允许匿名访问
allow_anonymous true

# MQTT 监听器
listener 1883
protocol mqtt
max_connections -1
allow_anonymous true

# WebSocket 监听器
listener 9001
protocol websockets
max_connections -1
allow_anonymous true

# 日志设置
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# 连接设置
max_queued_messages 1000
max_keepalive 65535
