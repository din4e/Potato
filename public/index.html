<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥔 土豆培育系统 - 控制面板</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-seedling"></i>
                <h1>土豆培育系统</h1>
                <span class="subtitle">Potato Cultivation System</span>
            </div>
            <div class="header-info">
                <span class="status-badge" id="connectionStatus">
                    <i class="fas fa-circle"></i>
                    <span id="statusText">连接中...</span>
                </span>
                <span class="time" id="currentTime">--:--:--</span>
            </div>
        </header>

        <!-- Device Selector -->
        <div class="device-selector">
            <label for="deviceSelect">选择设备:</label>
            <select id="deviceSelect">
                <option value="potato-chamber-01">培育箱 01</option>
            </select>
            <button class="btn btn-secondary" id="refreshDevice">
                <i class="fas fa-sync"></i>
            </button>
        </div>

        <!-- Main Dashboard -->
        <div class="dashboard">
            <!-- Sensor Cards -->
            <div class="sensor-grid">
                <div class="sensor-card">
                    <div class="sensor-icon moisture">
                        <i class="fas fa-water"></i>
                    </div>
                    <div class="sensor-info">
                        <h3>土壤湿度 1</h3>
                        <div class="sensor-value">
                            <span id="soilMoisture1">--</span>
                            <span class="unit">%</span>
                        </div>
                        <div class="sensor-bar">
                            <div class="sensor-bar-fill" id="soilMoisture1Bar"></div>
                        </div>
                    </div>
                </div>

                <div class="sensor-card">
                    <div class="sensor-icon moisture">
                        <i class="fas fa-water"></i>
                    </div>
                    <div class="sensor-info">
                        <h3>土壤湿度 2</h3>
                        <div class="sensor-value">
                            <span id="soilMoisture2">--</span>
                            <span class="unit">%</span>
                        </div>
                        <div class="sensor-bar">
                            <div class="sensor-bar-fill" id="soilMoisture2Bar"></div>
                        </div>
                    </div>
                </div>

                <div class="sensor-card">
                    <div class="sensor-icon temperature">
                        <i class="fas fa-temperature-high"></i>
                    </div>
                    <div class="sensor-info">
                        <h3>温度</h3>
                        <div class="sensor-value">
                            <span id="temperature">--</span>
                            <span class="unit">°C</span>
                        </div>
                        <div class="sensor-status" id="tempStatus">
                            <span class="status-dot"></span>
                            <span>正常</span>
                        </div>
                    </div>
                </div>

                <div class="sensor-card">
                    <div class="sensor-icon humidity">
                        <i class="fas fa-tint"></i>
                    </div>
                    <div class="sensor-info">
                        <h3>空气湿度</h3>
                        <div class="sensor-value">
                            <span id="humidity">--</span>
                            <span class="unit">%</span>
                        </div>
                        <div class="sensor-status" id="humidityStatus">
                            <span class="status-dot"></span>
                            <span>正常</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Middle Section -->
            <div class="middle-section">
                <!-- Camera Stream -->
                <div class="camera-panel">
                    <h3><i class="fas fa-video"></i> 实时监控</h3>
                    <div class="camera-container">
                        <img id="cameraStream" src="" alt="摄像头画面" class="camera-image">
                        <div class="camera-placeholder">
                            <i class="fas fa-video-slash"></i>
                            <p>摄像头未连接</p>
                        </div>
                    </div>
                    <div class="camera-controls">
                        <button class="btn btn-sm" id="refreshCamera">
                            <i class="fas fa-sync"></i> 刷新
                        </button>
                    </div>
                </div>

                <!-- Control Panel -->
                <div class="control-panel">
                    <h3><i class="fas fa-sliders-h"></i> 控制面板</h3>
                    <div class="control-grid">
                        <div class="control-item">
                            <div class="control-label">
                                <i class="fas fa-shower"></i>
                                <span>水泵</span>
                            </div>
                            <div class="control-buttons">
                                <button class="btn btn-control btn-on" id="pumpOn">
                                    <i class="fas fa-play"></i> 开启
                                </button>
                                <button class="btn btn-control btn-off" id="pumpOff">
                                    <i class="fas fa-stop"></i> 关闭
                                </button>
                            </div>
                            <div class="control-status" id="pumpStatus">
                                <span class="status-indicator"></span>
                                <span>已关闭</span>
                            </div>
                        </div>

                        <div class="control-item">
                            <div class="control-label">
                                <i class="fas fa-wind"></i>
                                <span>风扇</span>
                            </div>
                            <div class="control-buttons">
                                <button class="btn btn-control btn-on" id="fanOn">
                                    <i class="fas fa-play"></i> 开启
                                </button>
                                <button class="btn btn-control btn-off" id="fanOff">
                                    <i class="fas fa-stop"></i> 关闭
                                </button>
                            </div>
                            <div class="control-status" id="fanStatus">
                                <span class="status-indicator"></span>
                                <span>已关闭</span>
                            </div>
                        </div>

                        <div class="control-item">
                            <div class="control-label">
                                <i class="fas fa-clock"></i>
                                <span>手动浇水</span>
                            </div>
                            <div class="control-input">
                                <select id="irrigationDuration">
                                    <option value="5000">5 秒</option>
                                    <option value="10000" selected>10 秒</option>
                                    <option value="15000">15 秒</option>
                                    <option value="30000">30 秒</option>
                                </select>
                                <button class="btn btn-primary" id="manualIrrigation">
                                    <i class="fas fa-tint"></i> 浇水
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Section -->
            <div class="bottom-section">
                <!-- Chart -->
                <div class="chart-panel">
                    <h3><i class="fas fa-chart-line"></i> 传感器趋势 (24小时)</h3>
                    <div class="chart-tabs">
                        <button class="chart-tab active" data-type="soil_moisture">土壤湿度</button>
                        <button class="chart-tab" data-type="temperature">温度</button>
                        <button class="chart-tab" data-type="humidity">空气湿度</button>
                    </div>
                    <canvas id="sensorChart"></canvas>
                </div>

                <!-- Irrigation Log -->
                <div class="log-panel">
                    <h3><i class="fas fa-history"></i> 浇水记录</h3>
                    <div class="log-list" id="irrigationLog">
                        <div class="log-item">
                            <span class="log-time">--:--</span>
                            <span class="log-action">--</span>
                            <span class="log-reason">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Schedule Modal -->
        <div class="modal" id="scheduleModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>添加定时浇水</h3>
                    <button class="modal-close" id="closeScheduleModal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="scheduleForm">
                        <div class="form-group">
                            <label>名称</label>
                            <input type="text" id="scheduleName" placeholder="例如：每日早晨浇水" required>
                        </div>
                        <div class="form-group">
                            <label>时间</label>
                            <input type="time" id="scheduleTime" required>
                        </div>
                        <div class="form-group">
                            <label>持续时间 (秒)</label>
                            <input type="number" id="scheduleDuration" value="10" min="5" max="60" required>
                        </div>
                        <div class="form-group">
                            <label>重复日期</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" value="0" checked> 日</label>
                                <label><input type="checkbox" value="1" checked> 一</label>
                                <label><input type="checkbox" value="2" checked> 二</label>
                                <label><input type="checkbox" value="3" checked> 三</label>
                                <label><input type="checkbox" value="4" checked> 四</label>
                                <label><input type="checkbox" value="5" checked> 五</label>
                                <label><input type="checkbox" value="6" checked> 六</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">保存</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast">
            <i class="fas fa-info-circle"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
