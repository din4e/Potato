; PlatformIO Project Configuration File for ESP32 Potato Cultivation System
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial Monitor options
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS
    ; Uncomment for OTA support
    ; -D OTA_ENABLE

; Upload options
upload_speed = 921600

; Library dependencies
lib_deps =
    ; WiFi connection
   WiFiEsp32
    ; MQTT client
    knolleary/PubSubClient@^2.8
    ; DHT temperature/humidity sensor
    adafruit/DHT sensor library@^1.4.4
    adafruit/Unified Sensor@^1.1.9
    ; WebServer for configuration portal
    mathieucarbou/AsyncWebServer@^2.6.3
    mathieucarbou/AsyncTCP@^1.1.0
    ; JSON support
    bblanchon/ArduinoJson@^6.21.3
    ; Camera support (for ESP32-CAM)
    esp32-camera@^2.0.4

[env:esp32-cam]
platform = espressif32
board = esp32cam
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM
    -D CAMERA_MODEL_ESP32CAM

lib_deps =
    ${env:esp32dev.lib_deps}
