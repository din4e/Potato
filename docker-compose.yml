services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: potato-mqtt
    ports:
      - "9000:1883"
      - "9002:9001"  # WebSocket port
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped
    networks:
      - potato-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: potato-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: potato_system
      MYSQL_USER: potato
      MYSQL_PASSWORD: potato
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - potato-network

  # Adminer (Database Management UI)
  adminer:
    image: adminer:latest
    container_name: potato-adminer
    ports:
      - "8888:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: nette
    restart: unless-stopped
    networks:
      - potato-network
    depends_on:
      - mysql

volumes:
  mysql-data:
  mosquitto_data:
  mosquitto_logs:

networks:
  potato-network:
    driver: bridge
